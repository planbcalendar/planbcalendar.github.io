<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>릴리스노트 — PlanB Calendar</title>
<meta name="description" content="PlanB Calendar 버전별 업데이트 내역(릴리스노트). 새 기능·개선·버그 수정 이력을 확인하세요.">
<link rel="canonical" href="https://planb-calendar.co.kr/releases.html">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/png" href="assets/icon-256.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root{--bg:#0E1017;--card:#1A1E2C;--line:#262B3B;--tx:#EEF0F6;--mut:#9BA1B3;--pri:#7B78EC;}
  @media(prefers-color-scheme:light){html[data-theme="auto"]{--bg:#FBFBFE;--card:#fff;--line:#E6E8F0;--tx:#1B1E2A;--mut:#616779;--pri:#6E6BE6;}}
  *{box-sizing:border-box;margin:0;}
  body{background:var(--bg);color:var(--tx);font-family:system-ui,'Pretendard','Malgun Gothic',sans-serif;line-height:1.7;}
  a{color:var(--pri);}
  /* 공유 헤더 */
  .topnav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:20px;height:60px;padding:0 24px;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;color:var(--tx);text-decoration:none;letter-spacing:-.02em;}
  .brand img{border-radius:6px;}
  .tnlinks{display:flex;gap:20px;margin-left:auto;font-size:14px;}
  .tnlinks a{color:var(--mut);text-decoration:none;font-weight:500;}
  .tnlinks a:hover,.tnlinks a.on{color:var(--tx);}
  .dlbtn{background:var(--pri);color:#fff;padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:700;text-decoration:none;white-space:nowrap;}
  @media(max-width:720px){.tnlinks{display:none;}}
  /* 본문 */
  .wrap{max-width:760px;margin:0 auto;padding:44px 24px 90px;}
  h1{font-size:30px;letter-spacing:-.02em;margin-bottom:6px;}
  .lead{color:var(--mut);font-size:15px;margin-bottom:10px;}
  .ghlink{font-size:13.5px;color:var(--mut);margin-bottom:8px;display:inline-block;}
  .rel{padding:26px 0;border-top:1px solid var(--line);}
  .rel h2{font-size:22px;display:flex;align-items:center;gap:10px;letter-spacing:-.01em;}
  .tag{font-size:11px;font-weight:700;color:#fff;background:var(--pri);padding:2px 8px;border-radius:20px;}
  .date{color:var(--mut);font-size:13px;margin:4px 0 14px;}
  .body h3{font-size:15px;margin:16px 0 6px;color:var(--tx);}
  .body h4{font-size:13.5px;margin:12px 0 4px;color:var(--tx);}
  .body ul{padding-left:18px;margin:6px 0;}
  .body li{font-size:14.5px;color:var(--mut);margin-bottom:5px;}
  .body p{font-size:14.5px;color:var(--mut);margin:8px 0;}
  .body blockquote{border-left:3px solid var(--line);padding-left:12px;color:var(--mut);font-size:13.5px;margin:10px 0;}
  .body strong{color:var(--tx);}
  .mut{color:var(--mut);font-size:14px;}
</style>
</head>
<body>
<nav class="topnav">
  <a class="brand" href="/"><img src="assets/icon-256.png" width="24" height="24" alt="">PlanB Calendar</a>
  <div class="tnlinks">
    <a href="/#services">연동</a>
    <a href="/#features">기능</a>
    <a href="/#faq">FAQ</a>
    <a href="releases.html" class="on">릴리스노트</a>
    <a href="bug-report.html">버그 신고</a>
  </div>
  <a class="dlbtn" href="https://github.com/planbcalendar/planbcalendar.github.io/releases/latest/download/PlanB-Calendar-Setup.exe">다운로드</a>
</nav>

<div class="wrap">
  <h1>릴리스노트</h1>
  <p class="lead">버전별 업데이트 내역입니다.</p>
  <a class="ghlink" href="https://github.com/planbcalendar/planbcalendar.github.io/releases" target="_blank" rel="noopener">GitHub에서 전체 보기 ↗</a>
  <div id="rel"><p class="mut">불러오는 중…</p></div>
</div>

<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');}
  function md(body){
    var lines=String(body||'').split('\n'),html='',inList=false;
    function closeList(){if(inList){html+='</ul>';inList=false;}}
    for(var i=0;i<lines.length;i++){
      var line=lines[i].replace(/\r$/,'');
      if(/^\s*[-*] /.test(line)){if(!inList){html+='<ul>';inList=true;}html+='<li>'+inl(line.replace(/^\s*[-*] /,''))+'</li>';continue;}
      closeList();
      if(/^### /.test(line))html+='<h4>'+inl(line.slice(4))+'</h4>';
      else if(/^## /.test(line))html+='<h3>'+inl(line.slice(3))+'</h3>';
      else if(/^# /.test(line))html+='<h3>'+inl(line.slice(2))+'</h3>';
      else if(/^> /.test(line))html+='<blockquote>'+inl(line.slice(2))+'</blockquote>';
      else if(line.trim()!=='')html+='<p>'+inl(line)+'</p>';
    }
    closeList();return html;
  }
  var box=document.getElementById('rel');
  fetch('https://api.github.com/repos/planbcalendar/planbcalendar.github.io/releases')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(rs){
      if(!rs||!rs.length){box.innerHTML='<p class="mut">아직 릴리스가 없습니다.</p>';return;}
      box.innerHTML=rs.map(function(x,idx){
        var ver=esc(x.name||x.tag_name||'');
        var date=(x.published_at||'').slice(0,10);
        var latest=idx===0?' <span class="tag">최신</span>':'';
        return '<article class="rel"><h2>'+ver+latest+'</h2><div class="date">'+date+'</div><div class="body">'+md(x.body)+'</div></article>';
      }).join('');
    })
    .catch(function(){
      box.innerHTML='<p class="mut">릴리스 목록을 불러오지 못했습니다. <a href="https://github.com/planbcalendar/planbcalendar.github.io/releases" target="_blank" rel="noopener">GitHub에서 보기 ↗</a></p>';
    });
})();
</script>
</body>
</html>
