<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>릴리스노트 — PlanB Calendar</title>
<meta name="description" content="PlanB Calendar 버전별 업데이트 내역(릴리스노트). 새 기능·개선·버그 수정 이력을 확인하세요.">
<link rel="canonical" href="https://planb-calendar.co.kr/releases.html">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/png" href="assets/icon-256.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  /* ===== index.html 공유 헤더 시스템 (동일) ===== */
  :root{
    --ink:#111111;--body:#374151;--mut:#6b7280;--mutsoft:#898989;
    --line:#e5e7eb;--linesoft:#f3f4f6;--canvas:#ffffff;--soft:#f8f9fa;--card:#f5f5f5;
    --dark:#101010;--ondark:#ffffff;--ondarksoft:#a1a1aa;--accent:#6E6BE6;
  }
  html[data-theme="dark"]{--ink:#f4f4f6;--body:#c8ccd6;--mut:#9BA1B3;--mutsoft:#7d8290;--line:#262B3B;--linesoft:#1c202c;--canvas:#0E1017;--soft:#12141d;--card:#161a26;}
  *{box-sizing:border-box;margin:0;}
  body{background:var(--canvas);color:var(--ink);font-family:Pretendard,-apple-system,system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  a{color:inherit;text-decoration:none;}
  nav{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--canvas) 82%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .nav{display:flex;align-items:center;gap:26px;height:64px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.02em;}
  .navlinks{display:flex;gap:24px;margin-left:auto;font-size:14px;color:var(--mut);font-weight:500;}
  .navlinks a:hover{color:var(--ink);}
  .btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;background:none;color:inherit;font-family:inherit;}
  .btnP{background:var(--ink);color:var(--canvas);}
  .btnP:hover{background:var(--accent);color:#fff;}
  .tgl{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--canvas);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);font-size:15px;}
  @media(max-width:860px){.navlinks{display:none;}}
  /* ===== 페이지 본문 ===== */
  .page{max-width:760px;margin:0 auto;padding:44px 24px 90px;}
  h1{font-size:34px;letter-spacing:-.035em;margin-bottom:6px;font-weight:800;}
  .lead{color:var(--mut);font-size:15px;margin-bottom:10px;}
  .ghlink{font-size:13.5px;color:var(--mut);display:inline-block;margin-bottom:6px;}
  .ghlink:hover{color:var(--ink);}
  .rel{padding:28px 0;border-top:1px solid var(--line);}
  .rel h2{font-size:22px;display:flex;align-items:center;gap:10px;letter-spacing:-.02em;font-weight:800;}
  .reltag{font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:2px 9px;border-radius:9999px;}
  .date{color:var(--mut);font-size:13px;margin:5px 0 14px;}
  .body h3{font-size:15px;margin:16px 0 6px;color:var(--ink);font-weight:600;}
  .body h4{font-size:13.5px;margin:12px 0 4px;color:var(--ink);font-weight:600;}
  .body ul{padding-left:18px;margin:6px 0;}
  .body li{font-size:14.5px;color:var(--body);margin-bottom:5px;}
  .body p{font-size:14.5px;color:var(--body);margin:8px 0;}
  .body blockquote{border-left:3px solid var(--line);padding-left:12px;color:var(--mut);font-size:13.5px;margin:10px 0;}
  .body strong{color:var(--ink);}
  .body a{color:var(--accent);}
  .mut{color:var(--mut);font-size:14px;}
</style>
</head>
<body>

<nav><div class="wrap nav">
  <a class="brand" href="/"><img src="assets/icon-256.png" width="26" height="26" alt="PlanB Calendar 아이콘" style="border-radius:6px;">PlanB Calendar</a>
  <div class="navlinks"><a href="/#services">연동</a><a href="/#features">기능</a><a href="/#faq">FAQ</a><a href="releases.html">릴리스노트</a><a href="bug-report.html">버그 신고</a></div>
  <button class="tgl" id="themeBtn" aria-label="라이트/다크 전환">◐</button>
  <a class="btn btnP" href="https://github.com/planbcalendar/planbcalendar.github.io/releases/latest/download/PlanB-Calendar-Setup.exe">다운로드</a>
</div></nav>

<div class="page">
  <h1>릴리스노트</h1>
  <p class="lead">버전별 업데이트 내역입니다.</p>
  <a class="ghlink" href="https://github.com/planbcalendar/planbcalendar.github.io/releases" target="_blank" rel="noopener">GitHub에서 전체 보기 ↗</a>
  <div id="rel"><p class="mut">불러오는 중…</p></div>
</div>

<script>
(function(){
  // 테마: index와 동일 localStorage('planb_theme') 공유
  var html=document.documentElement,btn=document.getElementById('themeBtn');
  var saved=localStorage.getItem('planb_theme');if(saved)html.setAttribute('data-theme',saved);
  function sync(){btn.textContent=html.getAttribute('data-theme')==='dark'?'☾':'☀';}
  sync();
  btn.addEventListener('click',function(){var d=html.getAttribute('data-theme')==='dark';var n=d?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('planb_theme',n);sync();});

  // 릴리스 목록 (GitHub API)
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');}
  function md(body){
    var lines=String(body||'').split('\n'),out='',inList=false;
    function cl(){if(inList){out+='</ul>';inList=false;}}
    for(var i=0;i<lines.length;i++){
      var line=lines[i].replace(/\r$/,'');
      if(/^\s*[-*] /.test(line)){if(!inList){out+='<ul>';inList=true;}out+='<li>'+inl(line.replace(/^\s*[-*] /,''))+'</li>';continue;}
      cl();
      if(/^### /.test(line))out+='<h4>'+inl(line.slice(4))+'</h4>';
      else if(/^## /.test(line))out+='<h3>'+inl(line.slice(3))+'</h3>';
      else if(/^# /.test(line))out+='<h3>'+inl(line.slice(2))+'</h3>';
      else if(/^> /.test(line))out+='<blockquote>'+inl(line.slice(2))+'</blockquote>';
      else if(line.trim()!=='')out+='<p>'+inl(line)+'</p>';
    }
    cl();return out;
  }
  var box=document.getElementById('rel');
  fetch('https://api.github.com/repos/planbcalendar/planbcalendar.github.io/releases')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(rs){
      if(!rs||!rs.length){box.innerHTML='<p class="mut">아직 릴리스가 없습니다.</p>';return;}
      box.innerHTML=rs.map(function(x,idx){
        var ver=esc(x.name||x.tag_name||'');
        var date=(x.published_at||'').slice(0,10);
        var latest=idx===0?' <span class="reltag">최신</span>':'';
        return '<article class="rel"><h2>'+ver+latest+'</h2><div class="date">'+date+'</div><div class="body">'+md(x.body)+'</div></article>';
      }).join('');
    })
    .catch(function(){
      box.innerHTML='<p class="mut">릴리스 목록을 불러오지 못했습니다. <a href="https://github.com/planbcalendar/planbcalendar.github.io/releases" target="_blank" rel="noopener">GitHub에서 보기 ↗</a></p>';
    });
})();
</script>
</body>
</html>
